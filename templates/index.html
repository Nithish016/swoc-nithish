<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { text-align: center; }
        .plot { margin: 20px 0; text-align: center; }
        img { max-width: 100%; height: auto; }
    </style>
</head>
<body>
    <h1>Plant Disease Detection Results</h1>
    <div class="plot">
        <h2>RMSE Comparison</h2>
        <img src="/static/fig-1.jpg" alt="RMSE Comparison">
    </div>
    <div class="plot">
        <h2>ROC Curves</h2>
        <img src="/static/fig-2.jpg" alt="ROC Curves">
    </div>
    <div class="plot">
        <h2>Performance Metrics</h2>
        <img src="/static/fig-3.jpg" alt="Performance Metrics">
    </div>
    <div class="plot">
        <h2>Time Comparison</h2>
        <img src="/static/fig-4.jpg" alt="Time Comparison">
    </div>
    <div class="plot">
        <h2>Embrapa Feature Extraction</h2>
        <img src="/static/Embrapa_Feature_extraction.jpg" alt="Embrapa Features">
    </div>
    <div class="plot">
        <h2>New Plant Feature Extraction</h2>
        <img src="/static/New_Plant_Feature_extraction.jpg" alt="New Plant Features">
    </div>
    <div class="plot">
        <h2>PlantDoc Feature Extraction</h2>
        <img src="/static/PlantDoc_Feature_extraction.jpg" alt="PlantDoc Features">
    </div>
    <div class="plot">
        <h2>PlantVillage Feature Extraction</h2>
        <img src="/static/PlantVillage_Feature_extraction.jpg" alt="PlantVillage Features">
    </div>
    <div class="plot">
        <h2>Variance Comparison</h2>
        <img src="/static/Fig-5.jpg" alt="Variance Comparison">
    </div>
    <div class="plot">
        <h2>Fitness Convergence</h2>
        <img src="/static/Fitness.jpg" alt="Fitness Convergence">
    </div>
</body>
</html>
